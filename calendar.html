<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>モウワスレナーイ
    
  </title>
  <style>
    body { font-family: Arial, sans-serif; display: flex; justify-content: center; background: #f5f5f5; }
    .calendar { width: 450px; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    
    /* ヘッダー（月切り替え） */
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .header button { padding: 5px 10px; cursor: pointer; }

    /* 曜日と日付のグリッド設定（7列） */
    .weekdays, .days { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; }
    .weekdays div { font-weight: bold; padding: 10px 0; color: #666; }
    
    /* 日付のマス目 */
    .days div { padding: 15px 0; border: 1px solid #eee; cursor: pointer; transition: 0.2s; }
    .days div:hover:not(.empty) { background: #e0f7fa; }
    .days .empty { border: none; cursor: default; } /* 空白マス */
    .days .today { background: #009688; color: white; font-weight: bold; border-radius: 4px; }
  </style>
</head>
<body>

<div class="calendar">
  <div class="header">
    <button id="prev">◀ 先月</button>
    <h2 id="month-year"></h2>
    <button id="next">来月 ▶</button>
  </div>
  <div class="weekdays">
    <div style="color:red;">日</div><div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div style="color:blue;">土</div>
  </div>
  <div class="days" id="days-grid"></div>
</div>

<script>
  const date = new Date();

  function renderCalendar() {
    const year = date.getFullYear();
    const month = date.getMonth();

    // ヘッダーの文字を更新
    document.getElementById('month-year').innerText = `${year}年 ${month + 1}月`;

    // 今月の「1日」の曜日を取得 (0:日, 1:月...)
    const firstDayIndex = new Date(year, month, 1).getDay();
    // 今月の「最後の日（日数）」を取得
    const lastDay = new Date(year, month + 1, 0).getDate();

    const daysGrid = document.getElementById('days-grid');
    daysGrid.innerHTML = ''; // 一度リセット

    // 1日より前の空白のマスを埋める
    for (let i = 0; i < firstDayIndex; i++) {
      const emptyDiv = document.createElement('div');
      emptyDiv.classList.add('empty');
      daysGrid.appendChild(emptyDiv);
    }

    // 日付を埋める
    const today = new Date();
    for (let i = 1; i <= lastDay; i++) {
      const dayDiv = document.createElement('div');
      dayDiv.innerText = i;

      // 今日なら色を変える
      if (i === today.getDate() && month === today.getMonth() && year === today.getFullYear()) {
        dayDiv.classList.add('today');
      }

      daysGrid.appendChild(dayDiv);
    }
  }

  // ボタンイベント
  document.getElementById('prev').addEventListener('click', () => { date.setMonth(date.getMonth() - 1); renderCalendar(); });
  document.getElementById('next').addEventListener('click', () => { date.setMonth(date.getMonth() + 1); renderCalendar(); });

  // 初回表示
  renderCalendar();
</script>

</body>
</html>
